{% extends 'base.html' %}
{% block title %}edit_profile{% endblock %}
{% block content %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <h4 class="fw-bold mb-4 text-center">Edit Profile</h4>

            <form method="POST">
              {% csrf_token %}


              <div class="mb-3">
                <label for="first_name" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
              </div>

              <div class="mb-3">
                <label for="first_name" class="form-label">First Name</label>
                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}" required>
              </div>

              <div class="mb-3">
                <label for="last_name" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}" required>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
              </div>

              <div class="d-flex justify-content-between">
                <a href="{% url 'dashboard' %}" class="btn btn-outline-dark px-4 pt-3">Cancel</a>
                <p class="mt-3 text-center">
                  <a href="{% url 'change_password' %}" class="text-dark text-decoration-none">Change password</a>
                </p>
                <button type="submit" class="btn btn-dark ">Save Changes</button>
              </div>

            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
{% block Ai %}{% endblock %}
