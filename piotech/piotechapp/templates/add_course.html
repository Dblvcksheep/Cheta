{% extends 'base.html' %}
{% block title %}Add Course{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="card p-4 shadow-sm border-0">
    <h3 class="fw-bold mb-4 text-center">🎓 Add New Course</h3>

    <form method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
      {% csrf_token %}

      <!-- Course Information -->
      <div class="mb-3">
        <label for="course_title" class="form-label fw-semibold">Course Title</label>
        <input type="text" id="course_title" name="course_title" class="form-control" placeholder="e.g. Introduction to Blockchain" required>
      </div>

      <div class="mb-3">
        <label for="course_description" class="form-label fw-semibold">Course Description</label>
        <textarea id="course_description" name="course_description" class="form-control" rows="3" placeholder="Describe your course..." required></textarea>
      </div>

      <!-- Category Selection -->
      <div class="mb-3">
        <label for="category" class="form-label fw-semibold">Course Category</label>
        <select id="category" name="category" class="form-select" required>
          <option value="" selected disabled>Select a Category</option>
          <option value="EG">Engineering</option>
          <option value="BC">Blockchain</option>
          <option value="FD">Finance & Defi</option>
          <option value="WD">Web Development</option>
          <option value="DS">Data Science & AI</option>
          <option value="UI">UI/UX Design</option>
          <option value="CY">Cybersecurity</option>
          <option value="OT">Other</option>
        </select>
      </div>

      <!-- Cover Image -->
      <div class="mb-3">
        <label for="coverImage" class="form-label fw-semibold">Course Cover Image</label>
        <input type="file" id="coverImage" name="cover_image" class="form-control" accept="image/*" required>
        <div id="coverImageError" class="form-text text-danger small"></div>
      </div>

      <hr>

      <!-- Episodes -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">📺 Episodes</h5>
        <button type="button" id="add-episode" class="btn btn-outline-dark btn-sm">
          <i class="bi bi-plus-circle"></i> Add Episode
        </button>
      </div>

      <div id="episode-container">
        <div class="episode-item position-relative mb-3 border rounded p-3 bg-light">
          <button type="button" class="btn-close position-absolute top-0 end-0 m-2" aria-label="Remove"></button>
          <div class="mb-2">
            <label class="form-label">Episode Title</label>
            <input type="text" name="episode_title[]" class="form-control" placeholder="e.g. What is Blockchain?" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Episode Description</label>
            <textarea name="episode_description[]" class="form-control" rows="2" placeholder="About this episode." required></textarea>
          </div>
          <div class="mb-2">
            <label class="form-label">Episode Video</label>
            <input type="file" name="episode_video[]" class="form-control" accept="video/*">
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <a href="{% url 'courses' %}" class="btn btn-outline-dark px-4">Cancel</a>
        <button type="submit" class="btn btn-dark px-4">Create Course</button>
      </div>
    </form>
  </div>
</div>

<!-- Scripts -->
<script>
document.getElementById('add-episode').addEventListener('click', function() {
  const container = document.getElementById('episode-container');
  const newEpisode = document.createElement('div');
  newEpisode.classList.add('episode-item', 'position-relative', 'mb-3', 'border', 'rounded', 'p-3', 'bg-light');

  newEpisode.innerHTML = `
    <button type="button" class="btn-close position-absolute top-0 end-0 m-2" aria-label="Remove"></button>
    <div class="mb-2">
      <label class="form-label">Episode Title</label>
      <input type="text" name="episode_title[]" class="form-control" placeholder="e.g. Lesson 2: Advanced Concepts" required>
    </div>
    <div class="mb-2">
      <label class="form-label">Episode Description</label>
      <textarea name="episode_description[]" class="form-control" rows="2" placeholder="Briefly describe this episode..." required></textarea>
    </div>
    <div class="mb-2">
      <label class="form-label">Episode Video</label>
      <input type="file" name="episode_video[]" class="form-control" accept="video/*" required>
    </div>
  `;
  container.appendChild(newEpisode);

  // Enable removal for this new episode
  newEpisode.querySelector('.btn-close').addEventListener('click', () => newEpisode.remove());
});

// Enable removal for initial episode
document.querySelectorAll('.episode-item .btn-close').forEach(btn => {
  btn.addEventListener('click', function() {
    this.closest('.episode-item').remove();
  });
});

// Validate image type
const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
const input = document.getElementById('coverImage');
const errorDiv = document.getElementById('coverImageError');

input.addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return (errorDiv.textContent = '');

  if (!allowedTypes.includes(file.type)) {
    errorDiv.textContent = 'Invalid file type! Only JPEG, PNG, or WebP images are allowed.';
    input.value = '';
  } else {
    errorDiv.textContent = '';
  }
});
</script>

{% endblock %}
