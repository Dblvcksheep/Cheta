{% extends "base.html" %}
{% block title %} Forgot Password {% endblock %}
{% block content %}
<div class="container py-5 min-vh-100">
    <div class="card shadow-sm p-4">
        <h3>Forgot password</h3>
        <p class="text-muted">verify your email. A new password will be sent to your email.</p>
        <form method="post" action="{% url 'forget_password' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="email" class="form-label">Input your email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-dark" id="resetBtn" >Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
