{% extends "base.html" %}

{% block content %}
<div class="min-vh-100">
  <div class="container text-center py-5">
    <div class="card shadow-sm p-4">
      <h3 class="mb-3">Continue with Google</h3>
      <p class="text-muted">
        You are about to sign in using your <strong>Google account</strong>.
      </p>

      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-dark btn-lg">
          <i class="bi bi-google"></i> Confirm Sign In
        </button>
      </form>

      <div class="mt-3">
        <a href="{% url 'login' %}" class="btn btn-outline-secondary">
          Cancel
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
